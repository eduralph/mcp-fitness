; mypy strict config — see CLAUDE.md ("mypy strict must pass").
; This config applies repo-wide; CI runs `mypy --strict` against each
; package's src/ tree explicitly.

[mypy]
python_version = 3.12
strict = True
warn_unreachable = True
warn_return_any = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unused_configs = True
show_error_codes = True
show_column_numbers = True
pretty = True
namespace_packages = True
explicit_package_bases = True
mypy_path = packages/mcp-fitness-shared/src:packages/mcp-stryd/src:packages/mcp-garmin/src

; Tests aren't part of the strict surface — they may instantiate things
; loosely. The src/ trees are where strict matters.
[mypy-tests.*]
disallow_untyped_decorators = False
disallow_untyped_defs = False
disallow_incomplete_defs = False

; Third-party libs without stubs.
[mypy-fastmcp.*]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True
