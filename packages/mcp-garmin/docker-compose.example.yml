# Single-service example for mcp-garmin. Copy to docker-compose.yml in
# your deployment directory, populate ./mcp-garmin.env, and adjust the
# tokens / FIT volume paths. The repo-level docker-compose.example.yml
# shows this alongside mcp-stryd on the shared cloudflared_proxy network.

services:
  mcp-garmin:
    build:
      # Build context is the monorepo root (two levels up) so the path
      # dependency on mcp-fitness-shared resolves. Update if you copy
      # this file out of the repo.
      context: ../..
      dockerfile: packages/mcp-garmin/Dockerfile
    image: ghcr.io/eduralph/mcp-garmin:latest
    container_name: mcp-garmin
    restart: unless-stopped
    env_file:
      - path: ./mcp-garmin.env
        required: false
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
      MCP_LOG_LEVEL: "INFO"
      MCP_TOKEN_DIR: "/data/tokens"
    ports:
      - "8080:8080"
    volumes:
      - ./tokens:/data/tokens
      # Phase 2: FIT source. Read-only bind mount of the auto-export folder.
      # - /path/to/garmin-fit:/data/fit:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
