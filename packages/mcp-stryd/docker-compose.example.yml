# Single-service example for mcp-stryd. Copy to docker-compose.yml in
# your deployment directory, populate ./mcp-stryd.env, and adjust the
# tokens volume path. The repo-level docker-compose.example.yml shows
# this alongside mcp-garmin on the shared cloudflared_proxy network.

services:
  mcp-stryd:
    build:
      # Build context is the monorepo root (two levels up) so the path
      # dependency on mcp-fitness-shared resolves. Update if you copy
      # this file out of the repo.
      context: ../..
      dockerfile: packages/mcp-stryd/Dockerfile
    image: ghcr.io/eduralph/mcp-stryd:latest
    container_name: mcp-stryd
    restart: unless-stopped
    env_file:
      - path: ./mcp-stryd.env
        required: false
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
      MCP_LOG_LEVEL: "INFO"
      MCP_TOKEN_DIR: "/data/tokens"
    ports:
      - "8080:8080"
    volumes:
      - ./tokens:/data/tokens
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
