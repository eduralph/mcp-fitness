[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "mcp-stryd"
version = "0.1.0"
description = "MCP server exposing Stryd power-based training data to Claude"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "Eduard Ralph" }]
keywords = ["mcp", "stryd", "running", "fitness", "training"]
classifiers = [
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: POSIX :: Linux",
    "Typing :: Typed",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
]

dependencies = [
    "mcp-fitness-shared",
    "fastmcp>=2.0",
    "httpx>=0.27",
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "structlog>=24.4",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/eduralph/mcp-fitness"
Repository = "https://github.com/eduralph/mcp-fitness"
Issues = "https://github.com/eduralph/mcp-fitness/issues"

[project.scripts]
mcp-stryd = "mcp_stryd.__main__:main"

# Path-dependency on the internal shared package. When the wheel is
# built for PyPI a release-time step swaps this for a vendored sdist —
# but for local dev and the Docker build, the path dependency is what
# resolves.
[tool.uv.sources]
mcp-fitness-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_stryd"]

[tool.hatch.build.targets.sdist]
include = ["src/", "README.md", "CHANGELOG.md", "pyproject.toml"]
