# Ruff config — strict, modern Python style.
# Applies to the whole workspace. Per-package overrides via [per-file-ignores] below.

target-version = "py312"
line-length = 100
extend-exclude = [".venv", "build", "dist"]

[lint]
# A pragmatic strict baseline — pyflakes, pycodestyle, isort, bugbear, etc.
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific
    "S",      # flake8-bandit (security)
    "PT",     # pytest style
    "ANN",    # type-annotation completeness
    "ASYNC",  # async correctness
    "TRY",    # exception style
    "RET",    # return statement style
    "PIE",    # misc
    "PL",     # pylint subset
    "PTH",    # use pathlib
    "TID",    # tidy imports
    "TCH",    # type-checking imports
]
ignore = [
    "ANN401",  # allow `Any` where pragmatic (e.g. token JSON blobs)
    "TRY003",  # long exception messages — fine inside our structured errors
    "PLR0913", # tool functions with many keyword args are intentional
    "S101",    # assert is fine in tests
]

[lint.per-file-ignores]
"**/tests/**" = [
    "ANN",     # tests don't need return-type annotations
    "PLR2004", # magic numbers are normal in tests
    "S",       # bandit warnings irrelevant in tests
]
"**/__main__.py" = ["T201"]

[lint.isort]
known-first-party = ["mcp_fitness_shared", "mcp_stryd", "mcp_garmin"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
